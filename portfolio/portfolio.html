<!DOCTYPE html>
<html lang="en">

  <head>
    <link rel="stylesheet" type="text/css" href="portfolioStyle.css">
    <meta charset="utf-8">

    <!--FONTS-->
    <link href="https://fonts.googleapis.com/css?family=Karla&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Spectral&display=swap" rel="stylesheet">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <!--TAB-->
    <title>Portfolio</title>
    <link rel='icon' href='../favicon.ico' type='image/x-icon'/ >
  </head>

<body>
  <!--HEADER-->
      <header>
        <nav id="myHeader" class="navbar-fixed-top">
          <div class= "header-content">
            <div class="navBar-container" style="padding-top:-10px; margin-top:-10px;">
                <div class="logoNav">
                  <a href="index.html">
                    <img src="../NewLogo.png" width=45px >
                  </a>
                </div>
                <div style="display: block; float: right"> <!--  -->
                  <ul id="mainMenu" >
                    <li ><a href="./index.html" class="nav-link colored" id="homeNav">home</a></li>
                    <li ><a href="./index.html#aboutMe" class="nav-link colored" id="aboutNav">about</a></li>
                    <li ><a href="./index.html#whatIDo" class="nav-link colored" id="whatIDoNav">what i do</a></li>
                    <li ><a href="#" class="nav-link colored" id="portfolioNav">portfolio</a></li>
                    <li ><a href="./index.html#socialLinks" class="nav-link colored" id="contactNav">contact</a></li>
                  </ul>
                </div>
            </div>
          </div>
        </nav>
      </header>







      <script type="text/javascript">
      // When the user scrolls the page, execute myFunction
      window.onscroll = function() {scroll()};

      // Get the header
      var nav = document.getElementById("myHeader");

      // Get the nav bar links
      var about = document.getElementById("aboutNav");
      var home = document.getElementById("homeNav");
      var contact = document.getElementById("contactNav");
      var whatIDo = document.getElementById("whatIDoNav");
      var portfolio = document.getElementById("portfolioNav");

      // Get the offset position of the navbar
      var sticky = nav.offsetTop;

      // Add the sticky class to the header when you reach its scroll position. Remove "sticky" when you leave the scroll position
      function scroll() {
        if (window.pageYOffset > sticky) {
          nav.classList.add("sticky");
          about.classList.remove("colored");
          about.classList.add("white");

          home.classList.remove("colored");
          home.classList.add("white");

          contact.classList.remove("colored");
          contact.classList.add("white");

          whatIDo.classList.remove("colored");
          whatIDo.classList.add("white");

          portfolio.classList.remove("colored");
          portfolio.classList.add("white");

        } else {
          nav.classList.remove("sticky");
          about.classList.add("colored");
          about.classList.remove("white");

          home.classList.add("colored");
          home.classList.remove("white");

          contact.classList.add("colored");
          contact.classList.remove("white");

          whatIDo.classList.add("colored");
          whatIDo.classList.remove("white");

          portfolio.classList.add("colored");
          portfolio.classList.remove("white");
        }
      }

      </script>

</body>




</html>
